name: Create organization repository Bootstrap

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Nome do repositório a ser criado"
        required: true
        type: string
      team_slug:
        description: "Equipe com permissão de write"
        required: true
        type: choice
        options:
          - back-end
          - sre

permissions: {}

jobs:
  create-repo:
    runs-on: ubuntu-latest

    env:
      ORG_NAME: luiz-test-organizaiton
      DEVOPS_TEAM_SLUG: devops
      REPO_NAME: ${{ inputs.repo_name }}
      SELECTED_TEAM_SLUG: ${{ inputs.team_slug }}
      GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}

    steps:
      - name: Validate repository name
        run: |
          set -euo pipefail

          if [[ ! "${REPO_NAME}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "Nome de repositório inválido: ${REPO_NAME}"
            echo "Use apenas letras, números, ponto, underline e hífen."
            exit 1
          fi

      - name: Check if repository already exists
        run: |
          set -euo pipefail

          if gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${ORG_NAME}/${REPO_NAME}" >/dev/null 2>&1; then
            echo "O repositório ${ORG_NAME}/${REPO_NAME} já existe."
            exit 1
          fi

      - name: Create repository
        run: |
          set -euo pipefail

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/orgs/${ORG_NAME}/repos" \
            -f name="${REPO_NAME}" \
            -F private=false \
            -F auto_init=true

      - name: Add devops team as admin
        run: |
          set -euo pipefail

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/orgs/${ORG_NAME}/teams/${DEVOPS_TEAM_SLUG}/repos/${ORG_NAME}/${REPO_NAME}" \
            -f permission="admin"

      - name: Add selected team as write
        run: |
          set -euo pipefail

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/orgs/${ORG_NAME}/teams/${SELECTED_TEAM_SLUG}/repos/${ORG_NAME}/${REPO_NAME}" \
            -f permission="push"

      - name: Bootstrap repository structure
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORKDIR="$(mktemp -d)"
          cd "${WORKDIR}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${ORG_NAME}/${REPO_NAME}.git"
          cd "${REPO_NAME}"

          mkdir -p .github/workflows

          if [ ! -f README.md ]; then
            cat > README.md <<EOF
          # ${REPO_NAME}
          EOF
          fi

          cat > .github/workflows/validate-pr.yml <<'EOF'
          name: Validate PR rules

          on:
            pull_request:
              branches:
                - hml
                - dev
                - staging
                - master
              types:
                - opened
                - edited
                - synchronize
                - reopened

          permissions:
            contents: read
            pull-requests: read

          jobs:
            validate-pr:
              name: Validate PR title and branch flow
              runs-on: ubuntu-latest

              steps:
                - name: Validate PR title pattern
                  env:
                    PR_TITLE: ${{ '${{ github.event.pull_request.title }}' }}
                  run: |
                    set -euo pipefail

                    echo "PR title: ${PR_TITLE}"

                    REGEX='^(Fix|Feat|Docs|Chore|Refactor): .{5,}$'

                    if [[ ! "${PR_TITLE}" =~ ${REGEX} ]]; then
                      echo "Título da PR inválido."
                      exit 1
                    fi

                - name: Validate branch flow
                  env:
                    BASE_REF: ${{ '${{ github.event.pull_request.base.ref }}' }}
                    HEAD_REF: ${{ '${{ github.head_ref }}' }}
                  run: |
                    set -euo pipefail

                    echo "Base branch: ${BASE_REF}"
                    echo "Head branch: ${HEAD_REF}"

                    if [[ "${BASE_REF}" == "hml" && "${HEAD_REF}" != "dev" ]]; then
                      echo "PR inválida: a branch staging só pode receber PR da branch dev."
                      exit 1
                    fi

                    if [[ "${BASE_REF}" == "staging" && "${HEAD_REF}" != "hml" ]]; then
                      echo "PR inválida: a branch staging só pode receber PR da branch dev."
                      exit 1
                    fi

                    if [[ "${BASE_REF}" == "master" && "${HEAD_REF}" != "staging" ]]; then
                      echo "PR inválida: a branch master só pode receber PR da branch staging."
                      exit 1
                    fi

                    echo "Fluxo de branches válido."
          EOF

          if git diff --quiet && git diff --cached --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "Nenhuma alteração para commit."
            exit 0
          fi

          git add README.md .github/workflows/validate-pr.yml
          git commit -m "chore: bootstrap repository structure"
          git push origin HEAD

      - name: Create master, staging and dev branches
        run: |
          set -euo pipefail

          WORKDIR="$(mktemp -d)"
          cd "${WORKDIR}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${ORG_NAME}/${REPO_NAME}.git"
          cd "${REPO_NAME}"

          git checkout -b master
          git push origin master

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${ORG_NAME}/${REPO_NAME}" \
            -f default_branch="master"

          git checkout -b staging
          git push origin staging

          git checkout -b hml
          git push origin hml

          git checkout master
          git checkout -b dev
          git push origin dev

      - name: Protect staging branch
        run: |
          set -euo pipefail

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${ORG_NAME}/${REPO_NAME}/branches/staging/protection" \
            --input - <<'JSON'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": ["Validate PR title and branch flow"]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "required_linear_history": false,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": false,
            "lock_branch": false,
            "allow_fork_syncing": false
          }
          JSON
      
      - name: Protect dev branch
        run: |
          set -euo pipefail

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${ORG_NAME}/${REPO_NAME}/branches/dev/protection" \
            --input - <<'JSON'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": ["Validate PR title and branch flow"]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "required_linear_history": false,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": false,
            "lock_branch": false,
            "allow_fork_syncing": false
          }
          JSON

      - name: Protect master branch
        run: |
          set -euo pipefail

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${ORG_NAME}/${REPO_NAME}/branches/master/protection" \
            --input - <<'JSON'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": ["Validate PR title and branch flow"]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "required_linear_history": false,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": false,
            "lock_branch": false,
            "allow_fork_syncing": false
          }
          JSON

      - name: Delete main branch
        run: |
          set -euo pipefail

          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${ORG_NAME}/${REPO_NAME}/git/refs/heads/main" || true

      - name: Summary
        run: |
          {
            echo "## Repositório criado com sucesso"
            echo ""
            echo "- Repositório: \`${ORG_NAME}/${REPO_NAME}\`"
            echo "- Time admin: \`${DEVOPS_TEAM_SLUG}\`"
            echo "- Time write: \`${SELECTED_TEAM_SLUG}\`"
            echo "- Branch default: \`master\`"
            echo "- Branches criadas:"
            echo "  - \`master\`"
            echo "  - \`staging\`"
            echo "  - \`dev\`"
            echo "- Estrutura inicial:"
            echo "  - \`README.md\`"
            echo "  - \`.github/workflows/validate-pr.yml\`"
          } >> "$GITHUB_STEP_SUMMARY"
