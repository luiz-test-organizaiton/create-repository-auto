name: Create organization repository Boostramp

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Nome do repositório a ser criado"
        required: true
        type: string
      team_slug:
        description: "Equipe com permissão de write"
        required: true
        type: choice
        options:
          - back-end
          - devops
          - sre

permissions: {}

jobs:
  create-repo:
    runs-on: ubuntu-latest

    env:
      ORG_NAME: luiz-test-organizaiton
      DEVOPS_TEAM_SLUG: devops
      REPO_NAME: ${{ inputs.repo_name }}
      SELECTED_TEAM_SLUG: ${{ inputs.team_slug }}
      GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}

    steps:
#Checa se o nome do repo é valido
      - name: Validate repository name
        run: |
          set -euo pipefail

          if [[ ! "${REPO_NAME}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "Nome de repositório inválido: ${REPO_NAME}"
            echo "Use apenas letras, números, ponto, underline e hífen."
            exit 1
          fi

#Checa de o nome que foi adicionado para o repo, já não existe.
      - name: Check if repository already exists
        run: |
          set -euo pipefail

          if gh api "repos/${ORG_NAME}/${REPO_NAME}" >/dev/null 2>&1; then
            echo "O repositório ${ORG_NAME}/${REPO_NAME} já existe."
            exit 1
          fi

#Realiza a criação do repositorio
      - name: Create repository
        run: |
          set -euo pipefail

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${ORG_NAME}/repos" \
            -f name="${REPO_NAME}" \
            -F private=true \
            -F auto_init=true

#Adiciona o time de Devops como admin do repo
      - name: Add devops team as admin
        run: |
          set -euo pipefail

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${ORG_NAME}/teams/${DEVOPS_TEAM_SLUG}/repos/${ORG_NAME}/${REPO_NAME}" \
            -f permission="admin"

#Adiona a permisão ao time selecionado na hora da criacao como write no repo.
      - name: Add selected team as write
        run: |
          set -euo pipefail

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${ORG_NAME}/teams/${SELECTED_TEAM_SLUG}/repos/${ORG_NAME}/${REPO_NAME}" \
            -f permission="push"

#Criar o readme.md e criar as pastas .github/workflows/ com o devido conteudo dentro
      - name: Bootstrap repository structure
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORKDIR="$(mktemp -d)"
          cd "${WORKDIR}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${ORG_NAME}/${REPO_NAME}.git"
          cd "${REPO_NAME}"

          mkdir -p .github/workflows

          if [ ! -f README.md ]; then
            cat > README.md <<EOF
          # ${REPO_NAME}
          EOF
          fi

          cat > .github/workflows/validate-pr.yml <<'EOF'
          name: Validate PR rules
          on:
            pull_request:
                branches:
                    - dev
                    - staging
                    - master
                types:
                    - opened
                    - edited
                    - synchronize
                    - reopened
          permissions:
            contents: read
            pull-requests: read
            
          jobs:
            validate-pr:
                name: Validate PR title and branch flow
                runs-on: ubuntu-latest

                steps:
                    - name: Validate PR title pattern
                    env:
                        PR_TITLE: ${{ github.event.pull_request.title }}
                    run: |
                        set -euo pipefail

                        echo "PR title: ${PR_TITLE}"

                        REGEX='^(Fix|Feat|Docs|Chore|Refactor): .{5,}$'

                        if [[ ! "${PR_TITLE}" =~ ${REGEX} ]]; then
                          echo "Título da PR inválido."
                          exit 1
                        fi

                    - name: Validate branch flow
                    env:
                        BASE_REF: ${{ github.event.pull_request.base.ref }}
                        HEAD_REF: ${{ github.head_ref }}
                    run: |
                        set -euo pipefail

                        echo "Base branch: ${BASE_REF}"
                        echo "Head branch: ${HEAD_REF}"

                        if [[ "${BASE_REF}" == "staging" && "${HEAD_REF}" != "dev" ]]; then
                          echo "PR inválida: staging só aceita PR de dev."
                          exit 1
                        fi

                        if [[ "${BASE_REF}" == "master" && "${HEAD_REF}" != "staging" ]]; then
                          echo "PR inválida: master só aceita PR de staging."
                            exit 1
                        fi

                        echo "Fluxo válido."
          EOF              


          

          if git diff --quiet && git diff --cached --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "Nenhuma alteração para commit."
            exit 0
          fi
          

          git add README.md .github/workflows/validate-pr.yml
          git commit -m "chore: bootstrap repository structure"
          git push origin HEAD

#Criação das branchs, dev, staging e master. Colocando a master como default branch
      - name: Bootstrap repository structure
        run: |
          set -euo pipefail

          WORKDIR="$(mktemp -d)"
          cd "${WORKDIR}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${ORG_NAME}/${REPO_NAME}.git"
          cd "${REPO_NAME}"

          # Cria master a partir da branch atual (main)
          git checkout -b master
          git push origin master

          # Muda default branch para master
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${ORG_NAME}/${REPO_NAME}" \
            -f default_branch="master"

          # Cria staging e dev a partir de master
          git checkout -b staging
          git push origin staging

          git checkout master
          git checkout -b dev
          git push origin dev

#Delete branch main(default)
      - name: Bootstrap repository structure
        run: |
          set -euo pipefail

          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            "/repos/${ORG_NAME}/${REPO_NAME}/git/refs/heads/main" || true

#Informativo final
      - name: Summary
        run: |
          {
            echo "## Repositório criado com sucesso"
            echo ""
            echo "- Repositório: \`${ORG_NAME}/${REPO_NAME}\`"
            echo "- Time admin: \`${DEVOPS_TEAM_SLUG}\`"
            echo "- Time write: \`${SELECTED_TEAM_SLUG}\`"
            echo "- Estrutura inicial:"
            echo "  - \`README.md\`"
            echo "  - \`.github/workflows/.gitkeep\`"

          } >> "$GITHUB_STEP_SUMMARY"

        
        