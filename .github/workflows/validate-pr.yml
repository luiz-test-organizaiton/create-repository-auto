name: Validate PR rules

on:
  pull_request:
    branches:
      - dev
      - staging
      - master
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr:
    name: Validate PR title and branch flow
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title pattern
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          echo "PR title: ${PR_TITLE}"

          # Prefixos permitidos:
          # Fix, Feat, Docs, Chore, Refactor
          # Exige ao menos 5 caracteres após ": "
          REGEX='^(Fix|Feat|Docs|Chore|Refactor): .{5,}$'

          if [[ ! "${PR_TITLE}" =~ ${REGEX} ]]; then
            echo "Título da PR inválido."
            exit 1
          fi

      - name: Validate branch flow
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          echo "Base branch: ${BASE_REF}"
          echo "Head branch: ${HEAD_REF}"

          if [[ "${BASE_REF}" == "staging" && "${HEAD_REF}" != "dev" ]]; then
            echo "PR inválida: a branch staging só pode receber PR da branch dev."
            exit 1
          fi

          if [[ "${BASE_REF}" == "master" && "${HEAD_REF}" != "staging" ]]; then
            echo "PR inválida: a branch master só pode receber PR da branch staging."
            exit 1
          fi

          echo "Fluxo de branches válido."